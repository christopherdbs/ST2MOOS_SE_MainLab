<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="w-75 mx-auto">
        <h1 class="">Programmers List</h1>
        <a th:href="@{/programmers/add}" class="btn btn-primary mt-3 mb-3">
            <i class="bi bi-plus-circle"></i> Add New Programmer
        </a>
        <table class="table table-striped table-hover shadow-sm ">
            <thead class="table-dark ">
                <tr>
                    <th>ID</th>
                    <th>Firstname</th>
                    <th>Lastname</th>
                    <th class="w-auto"></th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="p: ${programmers}">
                    <td th:text="${p.id}">ID</td>
                    <td th:text="${p.firstName}" class="">Firstname</td>
                    <td th:text="${p.name}" class="">Lastname</td>
                    <td class="d-flex gap-2 text-nowrap">
                        <a th:href="@{/programmers/edit/{id}(id=${p.id})}" class="btn btn-warning btn-sm">Edit</a>
                        <!--Method 1
                        <form th:action="@{/programmers/{id}(id=${p.id})}" method="post">
                            <input type="hidden" name="_method" value="DELETE"/>
                            <button type="submit" class="btn btn-danger btn-sm">Delete</button>
                        </form>-->
                        <form th:action="@{/programmers/{id}(id=${p.id})}" th:method="delete">
                            <button type="submit" class="btn btn-danger btn-sm">Delete</button>
                        </form>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</body>
</html>
