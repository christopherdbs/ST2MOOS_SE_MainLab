<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="card shadow">
        <div class="card-header bg-primary text-white">
            <h2 th:text="${programmer.id == null} ? 'Add a programmer' : 'Modify programmer'">
        </div>
        <div class="card-body">
            <form th:action="@{/programmers}" th:object="${programmer}" method="post" class="col-md-6">
                <input type="hidden" th:field="*{id}" />
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label font-weight-bold">Firstname</label>
                        <input type="text" th:field="*{firstName}" class="form-control" placeholder="Ex: Christopher" required>
                    </div>

                    <div class="col-md-6 mb-3">
                        <label class="form-label">Lastname</label>
                        <input type="text" th:field="*{name}" class="form-control" placeholder="Ex: Dubois" required>
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label">Adress</label>
                    <input type="text" th:field="*{address}" class="form-control" placeholder="Ex: 123 Main Street">
                </div>

                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Favorite Language</label>
                        <input type="text" th:field="*{favoriteLanguage}" class="form-control" placeholder="Ex: Java">
                    </div>

                    <div class="col-md-6 mb-3">
                        <label class="form-label">Salary</label>
                        <input type="number" step="0.01" th:field="*{salary}" class="form-control" placeholder="Ex: 10 000.00">
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label">Favorite Book</label>
                    <input type="text" th:field="*{favoriteBook}" class="form-control" placeholder="Ex: Clean Code">
                </div>
                <button type="submit" class="btn btn-success">Save</button>
                <a th:href="@{/programmers}" class="btn btn-secondary">Cancel</a>
            </form>
        </div>
    </div>
</body>
</html>
